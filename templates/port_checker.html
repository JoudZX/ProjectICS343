<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Port Checker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
<div class="container">
    <h1>Port Checker</h1>
    <p>Check if a port is open on a host.</p>

    <form method="POST">
        <input type="text" name="host" placeholder="Enter domain or IP (e.g. google.com)" required>
        <input type="number" name="port" placeholder="Enter port (1–65535)" required>
        <button type="submit">Check</button>
    </form>

    {% if result %}
    <div class="result {{ 'success' if status == 'open' else 'error' }}">
        {{ result }}
    </div>
    {% endif %}

    {% if error %}
    <div class="result error">
        {{ error }}
    </div>
    {% endif %}

    <div class="link-group">
        <a href="/dns">DNS</a> |
        <a href="/reverse-dns">Reverse DNS</a>
    </div>
</div>
</body>
</html>
